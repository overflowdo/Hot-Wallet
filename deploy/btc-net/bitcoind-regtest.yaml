apiVersion: v1
kind: Secret
metadata:
  name: bitcoind-rpc-auth
  namespace: btc-net
type: Opaque
stringData:
  RPC_USER: "rpcuser"
  RPC_PASS: "change-me-strong"
---
apiVersion: v1
kind: Service
metadata:
  name: bitcoind-regtest
  namespace: btc-net
spec:
  selector:
    app: bitcoind-regtest
  ports:
    - name: rpc
      port: 18443
      targetPort: 18443
    - name: p2p
      port: 18444
      targetPort: 18444
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: bitcoind-regtest
  namespace: btc-net
spec:
  serviceName: bitcoind-regtest
  replicas: 1
  selector:
    matchLabels:
      app: bitcoind-regtest
  template:
    metadata:
      labels:
        app: bitcoind-regtest
    spec:
      containers:
        - name: bitcoind
          image: ruimarinho/bitcoin-core:26
          env:
            - name: RPC_USER
              valueFrom: { secretKeyRef: { name: bitcoind-rpc-auth, key: RPC_USER } }
            - name: RPC_PASS
              valueFrom: { secretKeyRef: { name: bitcoind-rpc-auth, key: RPC_PASS } }
          args:
            - "-regtest=1"
            - "-server=1"
            - "-disablewallet=1"
            - "-rpcbind=0.0.0.0"
            - "-rpcallowip=0.0.0.0/0"
            - "-rpcport=18443"
            - "-port=18444"
            - "-rpcuser=$(RPC_USER)"
            - "-rpcpassword=$(RPC_PASS)"
            - "-printtoconsole=1"
          ports:
            - containerPort: 18443
            - containerPort: 18444
          volumeMounts:
            - name: data
              mountPath: /home/bitcoin/.bitcoin
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 50Gi