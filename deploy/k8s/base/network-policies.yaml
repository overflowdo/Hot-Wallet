apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: btc-hot
spec:
  podSelector: {}
  policyTypes: ["Ingress","Egress"]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: btc-hot
spec:
  podSelector: {}
  policyTypes: ["Egress"]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: coredns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-middleware-egress
  namespace: btc-hot
spec:
  podSelector:
    matchLabels:
      app: middleware
  policyTypes: ["Egress"]
  egress:
    - to:
        - podSelector: { matchLabels: { app: opa } }
      ports:
        - protocol: TCP
          port: 8181
    - to:
        - podSelector: { matchLabels: { app: nats } }
      ports:
        - protocol: TCP
          port: 4222
    - to:
        - podSelector: { matchLabels: { app: policy-signer } }
      ports:
        - protocol: TCP
          port: 8080
    - to:
        - podSelector: { matchLabels: { app: tx-builder } }
      ports:
        - protocol: TCP
          port: 8080
    - to:
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: btc-net } }
      ports:
        - protocol: TCP
          port: 18443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-tx-builder-ingress
  namespace: btc-hot
spec:
  podSelector:
    matchLabels:
      app: tx-builder
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: middleware } }
      ports:
        - protocol: TCP
          port: 8080
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-tx-builder-egress
  namespace: btc-hot
spec:
  podSelector:
    matchLabels:
      app: tx-builder
  policyTypes: ["Egress"]
  egress:
    - to:
        - podSelector: { matchLabels: { app: nats } }
      ports:
        - protocol: TCP
          port: 4222
    - to:
        - podSelector: { matchLabels: { app: opa } }
      ports:
        - protocol: TCP
          port: 8181
    - to:
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: btc-net } }
      ports:
        - protocol: TCP
          port: 18443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-opa-ingress
  namespace: btc-hot
spec:
  podSelector:
    matchLabels:
      app: opa
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: middleware } }
        - podSelector: { matchLabels: { app: tx-builder } }
        - podSelector: { matchLabels: { app: policy-signer } }
      ports:
        - protocol: TCP
          port: 8181
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-policy-signer-ingress
  namespace: btc-hot
spec:
  podSelector:
    matchLabels:
      app: policy-signer
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: middleware } }
      ports:
        - protocol: TCP
          port: 8080
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-policy-signer-egress
  namespace: btc-hot
spec:
  podSelector:
    matchLabels:
      app: policy-signer
  policyTypes: ["Egress"]
  egress:
    - to:
        - podSelector: { matchLabels: { app: opa } }
      ports:
        - protocol: TCP
          port: 8181