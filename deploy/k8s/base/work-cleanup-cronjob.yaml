apiVersion: batch/v1
kind: CronJob
metadata:
  name: btc-work-cleanup
  namespace: btc-hot
spec:
  schedule: "0 */6 * * *"  # alle 6 Stunden
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: cleanup
              image: alpine:3.20
              command: ["/bin/sh","-lc"]
              args:
                - |
                  set -e
                  ROOT="/var/lib/btc-work/psbt-work"
                  # delete directories older than 7 days
                  find "$ROOT" -mindepth 1 -maxdepth 1 -type d -mtime +7 -print -exec rm -rf {} \;
              volumeMounts:
                - name: work
                  mountPath: /var/lib/btc-work
          volumes:
            - name: work
              persistentVolumeClaim:
                claimName: btc-work-pvc