apiVersion: v1
kind: Service
metadata:
  name: middleware
  namespace: btc-hot
spec:
  selector:
    app: middleware
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: middleware
  namespace: btc-hot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: middleware
  template:
    metadata:
      labels:
        app: middleware
    spec:
      containers:
        - name: middleware
          image: ghcr.io/your-org/middleware:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: btc-hot-config
            - secretRef:
                name: btc-hot-secrets
          env:
            - name: SERVICE_NAME
              value: "middleware"
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 20
      volumes:
        - name: archive
          persistentVolumeClaim:
            claimName: btc-archive-pvc
      volumeMounts:
      - name: archive
        mountPath: /var/lib/btc-archive