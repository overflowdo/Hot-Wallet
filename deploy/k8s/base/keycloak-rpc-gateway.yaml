apiVersion: v1
kind: Service
metadata:
  name: bitcoind-rpc-gateway
  namespace: btc-net
spec:
  selector:
    app: bitcoind-rpc-gateway
  ports:
    - name: http
      port: 8080
      targetPort: 4180
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bitcoind-rpc-gateway
  namespace: btc-net
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bitcoind-rpc-gateway
  template:
    metadata:
      labels:
        app: bitcoind-rpc-gateway
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
          args:
            - --http-address=0.0.0.0:4180
            - --provider=keycloak-oidc
            - --oidc-issuer-url=$(OIDC_ISSUER_URL)
            - --client-id=$(OIDC_CLIENT_ID)
            - --client-secret=$(OIDC_CLIENT_SECRET)
            - --email-domain=*
            - --upstream=http://bitcoind-regtest:18443/
            - --pass-authorization-header=true
            - --skip-provider-button=true
          env:
            - name: OIDC_ISSUER_URL
              value: "https://<keycloak-host>/realms/<realm>"
            - name: OIDC_CLIENT_ID
              value: "<client-id>"
            - name: OIDC_CLIENT_SECRET
              value: "<client-secret>"