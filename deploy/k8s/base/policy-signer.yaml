apiVersion: v1
kind: Secret
metadata:
  name: policy-signer-secrets
  namespace: btc-hot
type: Opaque
stringData:
  HOT_SIGNING_KEY: "REPLACE_ME"
---
apiVersion: v1
kind: Service
metadata:
  name: policy-signer
  namespace: btc-hot
spec:
  selector:
    app: policy-signer
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: policy-signer
  namespace: btc-hot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: policy-signer
  template:
    metadata:
      labels:
        app: policy-signer
    spec:
      containers:
        - name: policy-signer
          image: ghcr.io/your-org/policy-signer:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: btc-hot-config
            - secretRef:
                name: btc-hot-secrets
            - secretRef:
                name: policy-signer-secrets
          env:
            - name: SERVICE_NAME
              value: "policy-signer"
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 20