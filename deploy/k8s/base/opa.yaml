apiVersion: v1
kind: ConfigMap
metadata:
  name: opa-policies
  namespace: btc-hot
data:
  hot.rego: |
    package policy.hot
    default allow = false
    allow { input.amount_sats <= data.limits.hot_max_sats }
  refill.rego: |
    package policy.refill
    default allow_intent = true
  data.json: |
    {
      "limits": { "hot_max_sats": 100000000 }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: opa
  namespace: btc-hot
spec:
  selector:
    app: opa
  ports:
    - name: http
      port: 8181
      targetPort: 8181
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opa
  namespace: btc-hot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opa
  template:
    metadata:
      labels:
        app: opa
    spec:
      containers:
        - name: opa
          image: openpolicyagent/opa:0.63.0
          args:
            - "run"
            - "--server"
            - "--addr=0.0.0.0:8181"
            - "/policies"
          ports:
            - containerPort: 8181
          volumeMounts:
            - name: policies
              mountPath: /policies
      volumes:
        - name: policies
          configMap:
            name: opa-policies