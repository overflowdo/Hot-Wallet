apiVersion: v1
kind: Secret
metadata:
  name: restic-config-btc-archive
  namespace: btc-hot
type: Opaque
stringData:
  # Beispiel für S3-kompatibles Backend (MinIO/On-Prem/S3):
  # WICHTIG: eindeutiger Pfad pro PVC (hier: btc-archive-pvc)
  RESTIC_REPOSITORY: "s3:https://<S3-ENDPOINT>/<BUCKET>/btc-archive-pvc"

  # Restic Repo Passwort (Verschlüsselung)
  RESTIC_PASSWORD: "<STRONG-RESTIC-PASSWORD>"

  # S3 Credentials
  AWS_ACCESS_KEY_ID: "<ACCESS_KEY>"
  AWS_SECRET_ACCESS_KEY: "<SECRET_KEY>"

  # Optional (je nach Provider):
  # AWS_DEFAULT_REGION: "eu-central-1"