apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: btc-archive-backup
  namespace: btc-hot
spec:
  sourcePVC: btc-archive-pvc

  trigger:
    # Beispiel: alle 30 Minuten
    schedule: "*/30 * * * *"

  restic:
    repository: restic-config-btc-archive

    pruneIntervalDays: 14

    retain:
      hourly: 48
      daily: 14
      weekly: 8
      monthly: 6
      yearly: 2

    # Konsistenz: PiT Copy (Snapshot/Clone/Direct sind gültig) [1](https://volsync.readthedocs.io/en/stable/usage/restic/index.html)[2](https://volsync.readthedocs.io/en/stable/installation/index.html)
    copyMethod: Snapshot

    # Optional: wenn du eine bestimmte VolumeSnapshotClass erzwingen willst
    # volumeSnapshotClassName: "<YOUR-VSC>"

#sourcePVC = Archiv‑PVC
#trigger.schedule = Cron
#restic.retain = Retention Policy
#restic.pruneIntervalDays = Prune‑Intervall
#optional copyMethod = Snapshot/Clone/Direct (Restic Doku