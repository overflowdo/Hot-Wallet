apiVersion: v1
kind: Service
metadata:
  name: tx-builder
  namespace: btc-hot
spec:
  selector:
    app: tx-builder
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tx-builder
  namespace: btc-hot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tx-builder
  template:
    metadata:
      labels:
        app: tx-builder
    spec:
      volumes:
        - name: work
          persistentVolumeClaim:
            claimName: btc-work-pvc
      containers:
        - name: tx-builder
          image: ghcr.io/your-org/tx-builder:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: btc-hot-config
            - secretRef:
                name: btc-hot-secrets
          env:
            - name: SERVICE_NAME
              value: "tx-builder"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20 
          volumeMounts:
            - name: work
              mountPath: /var/lib/btc-work
          env:
            - name: WORK_ROOT
              value: "/var/lib/btc-work/psbt-work"
            - name: BITCOIN_NETWORK
              value: "regtest"
            - name: REFILL_TARGET_ADDRESS
              value: "bcrt1qhotdepositaddress00000000000000000000000"
            - name: THRESHOLD_MIN_HOT_SATS
              value: "1000000"
            - name: THRESHOLD_TARGET_HOT_SATS
              value: "2000000"
          