apiVersion: v1
kind: ConfigMap
metadata:
  name: opa-policies
  namespace: btc-hot
data:
  hot.rego: |
    package policy.hot

    default decision := {
      "allow": false,
      "intent_type": "hot",
      "action": "deny",
      "reasons": ["not evaluated"],
      "limits": {}
    }

    decision := {
      "allow": true,
      "intent_type": "hot",
      "action": "execute",
      "reasons": [],
      "limits": limits
    } {
      not deny[_]
    }

    decision := {
      "allow": false,
      "intent_type": "hot",
      "action": "deny",
      "reasons": [r | r := deny[_]],
      "limits": limits
    } {
      deny[_]
    }

    limits := {
      "max_amount_sats": data.hot.limits.max_amount_sats,
      "daily_spent_sats": data.hot.limits.daily_spent_sats
    }