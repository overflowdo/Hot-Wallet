openapi: 3.0.3
info:
  title: Middleware API
  version: 0.1.0
servers:
  - url: http://middleware:8080
paths:
  /api/v1/hot/tx:
    post:
      summary: Request a hot auto-signed transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/intent.json
      responses:
        "202":
          description: Accepted - processing started
          content:
            application/json:
              schema:
                $ref: ../schemas/tx_state.json

  /api/v1/intents/{intentId}/psbt:
    get:
      summary: Get PSBT for a refill intent
      parameters:
        - name: intentId
          in: path
          required: true
          schema: { type: string }
        - name: format
          in: query
          required: false
          schema:
            type: string
            enum: [base64]
          description: Always base64 (transport format)
      responses:
        "200":
          description: PSBT base64 payload
          content:
            application/json:
              schema:
                $ref: ../schemas/psbt_payload.json

  /api/v1/broadcast:
    post:
      summary: Broadcast a signed raw transaction via node-only bitcoind
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [signed_rawtx_hex]
              properties:
                signed_rawtx_hex:
                  type: string
      responses:
        "200":
          description: TXID
          content:
            application/json:
              schema:
                type: object
                required: [txid]
                properties:
                  txid: { type: string }
                  
/api/v1/psbt/extract:
    post:
      summary: Extract raw transaction hex from a finalized PSBT (base64)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [psbt_base64]
              properties:
                psbt_base64:
                  type: string
      responses:
        "200":
          description: Raw transaction hex extracted
          content:
            application/json:
              schema:
                type: object
                required: [rawtx_hex]
                properties:
                  rawtx_hex:
                    type: string
        "422":
          description: PSBT not finalized or cannot extract

  /api/v1/archive/broadcasted:
    post:
      summary: Archive broadcasted artifacts to cluster storage (PVC)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [id, txid, broadcast_utc, final_psbt_file]
              properties:
                id: { type: string }
                txid: { type: string }
                broadcast_utc: { type: string }
                rawtx_hex: { type: string }
                final_psbt_file:
                  type: string
                  format: binary
                approval_json_file:
                  type: string
                  format: binary
                approval_sig_file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Stored
          content:
            application/json:
              schema:
                type: object
                required: [stored, archive_path]
                properties:
                  stored: { type: boolean }
                  archive_path: { type: string }